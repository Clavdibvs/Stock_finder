# CI: ogni push è verificato dai 133 test + lint + build frontend.
# Nessun segreto necessario: i test girano su SQLite in-memory senza rete.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app tests
      - name: Test (pytest)
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type-check (svelte-check)
        working-directory: frontend
        run: npm run check
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build immagine backend
        run: docker build backend
      - name: Build immagine web (frontend + Caddy)
        run: docker build -f deploy/web.Dockerfile .
